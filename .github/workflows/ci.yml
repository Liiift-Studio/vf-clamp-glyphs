name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest -v --tb=short --cov=core --cov-report=term-missing

      - name: Build distributable zip (preflight smoke check)
        run: |
          chmod +x scripts/build-zip.sh
          ./scripts/build-zip.sh
        # build-zip.sh refuses to ship if Info.plist/pyproject.toml/CHANGELOG
        # drift, if __pycache__ is present in the bundle, or if the zip
        # contains a self-referential symlink or more than 50 entries.
